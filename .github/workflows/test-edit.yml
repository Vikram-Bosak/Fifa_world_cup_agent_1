name: Test Local Edit

on:
  workflow_dispatch:

jobs:
  test-edit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          
      - name: Run Test Edit
        env:
          OPENAI_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: python test_edit.py
        
      - name: Upload Edited Video
        uses: actions/upload-artifact@v4
        with:
          name: edited-video-test
          path: workspace/*.mp4
