name: Standalone FIFA Video Downloader

on:
  workflow_dispatch:  # Allow manual runs
  schedule:
    - cron: '0 */2 * * *'  # Run every 2 hours

jobs:
  download_and_forward:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Downloader Agent
        run: python downloader/standalone_downloader.py

      - name: Commit Download Archive and State Files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update: Record downloaded video IDs and State Tracking"
          file_pattern: "downloader/download_archive.txt temp/pending_tasks.json temp/daily_limits.json"
