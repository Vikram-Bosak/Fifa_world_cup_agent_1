name: Standalone FIFA Video Downloader

on:
  workflow_dispatch:  # Allow manual runs
  schedule:
    - cron: '0 */2 * * *'  # Run every 2 hours

jobs:
  download_and_forward:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_REPORT_CHAT_ID: ${{ secrets.TELEGRAM_REPORT_CHAT_ID }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
      FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
      YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Main Agent Pipeline
        run: python main_agent.py

      - name: Commit Download Archive and State Files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update: Record agent tasks and states"
          file_pattern: "downloader/download_archive.txt temp/pending_tasks.json temp/daily_limits.json"
