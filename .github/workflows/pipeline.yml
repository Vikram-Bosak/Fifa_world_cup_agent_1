name: FIFA World Cup Video Pipeline

on:
  workflow_dispatch:
  schedule:
    # Schedule configured for 5 times a day (US EST / EDT) targeting US audience peaks
    - cron: '0 14 * * *' # 9:00 AM EST (14:00 UTC)
    - cron: '0 18 * * *' # 1:00 PM EST (18:00 UTC)
    - cron: '0 22 * * *' # 5:00 PM EST (22:00 UTC)
    - cron: '0 1 * * *'  # 8:00 PM EST (01:00 UTC)
    - cron: '0 4 * * *'  # 11:00 PM EST (04:00 UTC)

permissions:
  contents: write

jobs:
  process_video:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
      FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
      YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      X_PROFILES: ${{ secrets.X_PROFILES }}
      X_BACKUP_PROFILES: ${{ secrets.X_BACKUP_PROFILES }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Create Temp Directory
        run: mkdir -p temp

      - name: Run Sequential Pipeline (Download -> Edit -> Upload)
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python main_agent.py --force-upload
          else
            python main_agent.py
          fi

      - name: Commit and Push Queue Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add temp/queue.json || echo "No queue changes"
          git commit -m "Auto-update video queue from main pipeline" || echo "No changes to commit"
          git push
