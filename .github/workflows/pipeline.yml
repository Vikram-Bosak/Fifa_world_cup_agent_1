name: FIFA World Cup Video Pipeline

on:
  push:
    branches:
      - main
  schedule:
    # Run every 2 hours automatically
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    name: End-to-End FIFA Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: fifa-pipeline
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Step 1 - Run Pipeline Orchestrator (main_agent.py)
        id: main_agent
        env:
          OPENAI_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          X_PROFILES: ${{ secrets.X_PROFILES }}
          TWITTER_PROFILES: ${{ secrets.X_PROFILES }}
          X_BACKUP_PROFILES: ${{ secrets.X_BACKUP_PROFILES }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          echo "Starting Main Agent..."
          python main_agent.py

      - name: 📢 Step 2 - Run Unified Reporter (agent_4_reporter.py)
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python src/agent_4_reporter.py

      - name: 💾 Commit updated files (like history and archive)
        if: always()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add downloaded_history.txt || true
          git add temp/daily_limits.json || true
          git commit -m "Update download history and limits" || true
          git pull origin main --rebase --strategy-option=ours || true
          git push origin HEAD:main || true
