name: FIFA World Cup Video Pipeline

on:
  workflow_dispatch:
  schedule:
    # Run every hour to ensure 24x7 queue processing (Downloads & Edits)
    # Uploads are internally regulated by Python smart timing (5 peak slots/day)
    - cron: '0 */2 * * *'

permissions:
  contents: write

jobs:
  process_video:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
      FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
      YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      X_PROFILES: ${{ secrets.X_PROFILES }}
      X_BACKUP_PROFILES: ${{ secrets.X_BACKUP_PROFILES }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Create Temp Directory
        run: mkdir -p temp

      - name: Run Sequential Pipeline (Download -> Edit -> Upload)
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python main_agent.py --force-upload
          else
            python main_agent.py
          fi

      - name: Commit and Push Queue Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add temp/queue.json || echo "No queue changes"
          git commit -m "Auto-update video queue from main pipeline" || echo "No changes to commit"
          git push
