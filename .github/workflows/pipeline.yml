name: FIFA World Cup Video Pipeline

on:
  push:
    branches:
      - main
  schedule:
    # Schedule configured for 5 times a day (US EST / EDT) targeting US audience peaks
    - cron: '0 14 * * *' # 9:00 AM EST (14:00 UTC)
    - cron: '0 18 * * *' # 1:00 PM EST (18:00 UTC)
    - cron: '0 22 * * *' # 5:00 PM EST (22:00 UTC)
    - cron: '0 1 * * *'  # 8:00 PM EST (01:00 UTC)
    - cron: '0 4 * * *'  # 11:00 PM EST (04:00 UTC)
  workflow_dispatch:

jobs:
  run-pipeline:
    name: End-to-End FIFA Pipeline
    runs-on: ubuntu-latest
    concurrency:
      group: fifa-pipeline
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: 🚀 Step 1 - Run Pipeline Orchestrator (main_agent.py)
        id: main_agent
        env:
          OPENAI_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          X_PROFILES: ${{ secrets.X_PROFILES }}
          TWITTER_PROFILES: ${{ secrets.X_PROFILES }}
          X_BACKUP_PROFILES: ${{ secrets.X_BACKUP_PROFILES }}
        run: |
          echo "Starting Main Agent..."
          python main_agent.py

      - name: 💾 Commit updated files (like history and archive)
        if: always()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --rebase || true
          git add downloaded_history.txt || true
          git commit -m "Update download history" || true
          git push || true
