name: Twitter Scanner Agent

on:
  workflow_dispatch:
  schedule:
    # Runs every 2 hours
    - cron: '0 */2 * * *'

permissions:
  contents: write

jobs:
  run_scanner:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      X_PROFILES: ${{ secrets.X_PROFILES }}
      X_BACKUP_PROFILES: ${{ secrets.X_BACKUP_PROFILES }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Install System Dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu

      - name: Run Scanner Agent
        run: python scanner_agent.py

      - name: Commit and Push Queue Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add temp/queue.json || echo "No queue changes"
          git commit -m "Auto-update video queue" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push
