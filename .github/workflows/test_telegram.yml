name: Test Telegram
on: [workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test Telegram API
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          python3 -c "
          import urllib.request, urllib.parse, json, os
          token = os.environ.get('TELEGRAM_BOT_TOKEN')
          def test_chat(chat_id):
              url = f'https://api.telegram.org/bot{token}/sendMessage'
              data = urllib.parse.urlencode({'chat_id': chat_id, 'text': 'Testing channel...'}).encode()
              try:
                  req = urllib.request.Request(url, data=data)
                  urllib.request.urlopen(req)
                  print(f'SUCCESS for {chat_id}')
              except Exception as e:
                  print(f'FAILED for {chat_id}: {e}')
          
          test_chat('@FIFAInsiderUSAbot')
          test_chat('@FIFAInsiderUSA')
          test_chat('@FIFAInsider')
          "
